<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>

  <!--Perfil 1-->

  <div class="main-div">
    <div class="profile-preview">
      <div class="profile-principal">
        <img src="images/gato.jpg" alt="gato" class="profile-img1">
      </div>
      <div class="profile-stats">
          <p class="user-name"><strong>Oliver</strong></p>
          <div class="middle-stats">
            <img src="images/profile2.jpeg" alt="perfil" class="profile-img2">
            <p class="mutual-friends">2 mutual friends</p>
          </div>
        </div>
        <div class="button1">
          <button class="add-button">Add Friend</button>
        </div>
      </div>
    </div>
    <!-- Perfil 2-->
    <div class="profile-preview">
      <div class="profile-principal">
        <img src="images/dog.jpg" alt="gato" class="profile-img1">
      </div>
      <div class="profile-stats">
          <p class="user-name"><strong>Martin</strong></p>
          <div class="middle-stats">
            <img src="images/profile2.jpeg" alt="perfil" class="profile-img2">
            <p class="mutual-friends">4 mutual friends</p>
          </div>
        </div>
        <div class="button1">
          <button class="add-button">Add Friend</button>
        </div>
      </div>
    </div>
    <!--Perfil 3-->
    <div class="profile-preview">
      <div class="profile-principal">
        <img src="images/coruja.jpg" alt="gato" class="profile-img1">
      </div>
      <div class="profile-stats">
          <p class="user-name"><strong>Rubin</strong></p>
          <div class="middle-stats">
            <img src="images/profile2.jpeg" alt="perfil" class="profile-img2">
            <p class="mutual-friends">1 mutual friend</p>
          </div>
        </div>
        <div class="button1">
          <button class="add-button">Add Friend</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
